<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <h1 class="text-6xl">Phone Hunting</h1>
    </header>
    <main class="container mx-auto">
        <section>
            <!-- Search phone -->
            <div class="mt-5 mb-5 text-center">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchText" type="search" required placeholder="Search..." />
                </label>
                <button class="btn" onclick="searchBtn()">Search</button>
            </div>
        </section>
        <section>
            <div class="text-center">
                <span id="loading-dot" class="loading loading-dots loading-lg hidden"></span>
            </div>
            <div id="phones-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 lg:gap-3 md:gap-1">
                <!-- <div class="card bg-base-100 w-96 shadow-sm">
                    <figure>
                        <img
                        src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
                        alt="Shoes" />
                    </figure>
                    <div class="card-body">
                        <h2 class="card-title">Card Title</h2>
                        <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>
                        <div class="card-actions justify-end">
                        <button class="btn btn-primary">Buy Now</button>
                        </div>
                    </div>
                </div> -->
            </div>
            <div class="text-center">
                <button onclick="showAll()" id="showAllBtn" class="btn hidden mt-5">Show All</button>
            </div>
        </section>
        <section>
            <!-- Open the modal using ID.showModal() method -->
            <dialog id="show_modal_details" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box">
                    <div id="showPhoneDetailsContainer">

                    </div>
                    <div class="modal-action">
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </section>
    </main>
    <footer>
        
    </footer>

    <!-- Script -->
    <script src="scripts/index.js"></script>
</body>

</html>
